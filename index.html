<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Credit Card Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>Credit Card Generator</h2>

  <div class="card">
    <p id="cardType">VISA</p>
    <h3 id="cardNumber">XXXX XXXX XXXX XXXX</h3>
    <div class="details">
      <span id="expiry">MM/YY</span>
      <span id="cvv">CVV</span>
    </div>
  </div>

  <button onclick="generateCard()">Generate Card</button>
</div>

<script src="script.js"></script>
</body>
</html>
